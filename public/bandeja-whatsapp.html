<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <title>Bandeja WhatsApp — Los Plata</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --verde: #1e4a1a; --verde2: #2d6b25; --verde-burbuja: #d9fdd3;
      --gris-bg: #efeae2; --gris-burbuja: #ffffff; --texto: #111b21; --tenue: #667781;
    }
    html, body { height: 100%; font-family: 'Poppins', sans-serif; color: var(--texto); }
    body { display: flex; overflow: hidden; background: var(--gris-bg); }

    /* ── Login ── */
    #login {
      position: fixed; inset: 0; z-index: 100; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
      background: linear-gradient(160deg, #0f2010 0%, #1e4a1a 40%, #2d6b25 70%, #1a3a14 100%);
    }
    #login img { height: 150px; filter: drop-shadow(0 8px 24px rgba(0,0,0,0.45)); }
    #login p { color: rgba(255,255,255,0.65); letter-spacing: 0.12em; text-transform: uppercase; font-size: 0.85rem; }
    #login input { width: 90%; max-width: 420px; padding: 15px 20px; border-radius: 100px; border: none; font-family: inherit; font-size: 1rem; outline: none; }
    #login button { width: 90%; max-width: 420px; padding: 15px; border-radius: 100px; border: none; background: rgba(255,255,255,0.2); color: #fff; font-weight: 600; font-family: inherit; font-size: 1rem; cursor: pointer; }
    #login button:hover { background: rgba(255,255,255,0.32); }
    #loginMsg { color: #ffb3b3; font-size: 0.9rem; min-height: 18px; }

    /* ── Layout ── */
    #app { display: none; width: 100%; height: 100%; }
    #app.ready { display: flex; }

    #lista {
      width: 380px; min-width: 380px; height: 100%; background: #fff;
      border-right: 1px solid #e9edef; display: flex; flex-direction: column;
    }
    #lista header {
      background: var(--verde); color: #fff; padding: 14px 16px;
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
    }
    #lista header .t { font-weight: 600; font-size: 1.05rem; }
    #lista header .u { font-size: 0.78rem; opacity: 0.8; }
    #salir { background: rgba(255,255,255,0.18); color: #fff; border: none; border-radius: 100px; padding: 7px 14px; font-family: inherit; font-size: 0.8rem; cursor: pointer; }
    #buscar { margin: 10px; padding: 10px 16px; border-radius: 100px; border: none; background: #f0f2f5; font-family: inherit; font-size: 0.9rem; outline: none; }
    #chats { flex: 1; overflow-y: auto; }
    .chat-item { display: flex; gap: 12px; align-items: center; padding: 12px 16px; cursor: pointer; border-bottom: 1px solid #f4f4f4; }
    .chat-item:hover { background: #f5f6f6; }
    .chat-item.activo { background: #e9f3e8; }
    .avatar { width: 46px; height: 46px; min-width: 46px; border-radius: 50%; background: var(--verde2); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 1.05rem; }
    .chat-item .info { flex: 1; min-width: 0; }
    .chat-item .nom { font-weight: 500; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chat-item .prev { color: var(--tenue); font-size: 0.83rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chat-item .meta { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }
    .chat-item .hora { color: var(--tenue); font-size: 0.72rem; }
    .badge { background: #25d366; color: #fff; border-radius: 100px; min-width: 20px; height: 20px; padding: 0 6px; font-size: 0.72rem; display: flex; align-items: center; justify-content: center; font-weight: 600; }

    /* ── Conversación ── */
    #conv { flex: 1; height: 100%; display: flex; flex-direction: column; background: var(--gris-bg); }
    #convHead { background: var(--verde); color: #fff; padding: 12px 16px; display: flex; align-items: center; gap: 12px; }
    #convHead .volver { display: none; background: none; border: none; color: #fff; font-size: 1.4rem; cursor: pointer; }
    #convHead .nom { font-weight: 600; }
    #convHead .sub { font-size: 0.76rem; opacity: 0.85; }
    #vacio { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--tenue); text-align: center; padding: 20px; flex-direction: column; gap: 8px; }
    #msgs { flex: 1; overflow-y: auto; padding: 20px 8%; display: flex; flex-direction: column; gap: 6px; }
    .b { max-width: 70%; padding: 7px 11px 5px; border-radius: 8px; font-size: 0.92rem; line-height: 1.35; word-wrap: break-word; white-space: pre-wrap; box-shadow: 0 1px 0.5px rgba(0,0,0,0.13); position: relative; }
    .b.ent { align-self: flex-start; background: var(--gris-burbuja); border-top-left-radius: 0; }
    .b.sal { align-self: flex-end; background: var(--verde-burbuja); border-top-right-radius: 0; }
    .b .h { font-size: 0.66rem; color: var(--tenue); text-align: right; margin-top: 3px; }
    .b.medio { font-style: italic; color: var(--tenue); }
    #aviso24 { display: none; background: #fff4d6; color: #856404; text-align: center; font-size: 0.8rem; padding: 8px; }
    #barra { display: flex; gap: 10px; padding: 12px 16px; background: #f0f2f5; align-items: flex-end; }
    #texto { flex: 1; resize: none; max-height: 120px; padding: 11px 16px; border-radius: 22px; border: none; font-family: inherit; font-size: 0.95rem; outline: none; }
    #enviar { width: 48px; height: 48px; min-width: 48px; border-radius: 50%; border: none; background: var(--verde2); color: #fff; font-size: 1.2rem; cursor: pointer; }
    #enviar:disabled { opacity: 0.5; cursor: default; }

    @media (max-width: 820px) {
      #lista { width: 100%; min-width: 0; }
      #conv { position: fixed; inset: 0; z-index: 10; }
      #app.viendo-chat #lista { display: none; }
      #app:not(.viendo-chat) #conv { display: none; }
      #convHead .volver { display: block; }
      #msgs { padding: 16px 5%; }
    }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div id="login">
    <img src="https://losplata.s3.us-east-2.amazonaws.com/Logo.png" alt="Los Plata">
    <p>Bandeja de WhatsApp — contraseña de asesor</p>
    <input id="loginPwd" type="password" placeholder="Escribe tu contraseña..."
      onkeydown="if(event.key==='Enter') document.getElementById('btnLogin').click()">
    <button id="btnLogin">Ingresar</button>
    <div id="loginMsg"></div>
  </div>

  <!-- APP -->
  <div id="app">
    <div id="lista">
      <header>
        <div>
          <div class="t">Bandeja WhatsApp</div>
          <div class="u" id="quien"></div>
        </div>
        <button id="salir">Salir</button>
      </header>
      <input id="buscar" placeholder="Buscar por nombre o número...">
      <div id="chats"></div>
    </div>

    <div id="conv">
      <div id="vacio">
        <div style="font-size:2.4rem">💬</div>
        <div>Elige una conversación para empezar a responder</div>
      </div>
      <div id="convReal" style="display:none; flex:1; flex-direction:column; min-height:0;">
        <div id="convHead">
          <button class="volver" onclick="cerrarChat()">←</button>
          <div class="avatar" id="convAvatar"></div>
          <div>
            <div class="nom" id="convNom"></div>
            <div class="sub" id="convSub"></div>
          </div>
        </div>
        <div id="aviso24">⚠️ Pasaron 24h desde el último mensaje del cliente. WhatsApp solo deja responder con una plantilla aprobada (texto libre será rechazado).</div>
        <div id="msgs"></div>
        <div id="barra">
          <textarea id="texto" rows="1" placeholder="Escribe un mensaje..."></textarea>
          <button id="enviar" title="Enviar">➤</button>
        </div>
      </div>
    </div>
  </div>

<script>
const PWD_KEY = 'asesor_pwd', NAME_KEY = 'asesor_nombre';
let actual = null;        // telefono del chat abierto
let conversaciones = [];
let timerLista = null, timerChat = null;

const $ = id => document.getElementById(id);
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

async function api(path, body){
  const r = await fetch('/api/whatsapp/' + path, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ contrasena: localStorage.getItem(PWD_KEY), ...body })
  });
  return r.json();
}

/* ── Login ── */
$('btnLogin').onclick = async () => {
  const pwd = $('loginPwd').value.trim();
  if(!pwd) return;
  const r = await fetch('/api/admin/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ contrasena: pwd }) }).then(r=>r.json());
  if(r.status === 'ok'){
    localStorage.setItem(PWD_KEY, pwd);
    localStorage.setItem(NAME_KEY, r.asesor);
    arrancar();
  } else {
    $('loginMsg').textContent = 'Contraseña incorrecta';
  }
};

$('salir').onclick = () => { localStorage.removeItem(PWD_KEY); location.reload(); };

function arrancar(){
  $('login').style.display = 'none';
  $('app').classList.add('ready');
  $('quien').textContent = localStorage.getItem(NAME_KEY) || '';
  cargarLista();
  timerLista = setInterval(cargarLista, 5000);
}

/* ── Lista de conversaciones ── */
function hora(iso){
  if(!iso) return '';
  const d = new Date(iso), hoy = new Date();
  const mismoDia = d.toDateString() === hoy.toDateString();
  return mismoDia ? d.toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'}) : d.toLocaleDateString('es-CO',{day:'2-digit',month:'2-digit'});
}
function inicial(c){ const n = c.nombre_perfil || c.telefono || '?'; return n.trim().charAt(0).toUpperCase(); }

async function cargarLista(){
  const r = await api('conversaciones', {});
  if(r.status !== 'ok'){ if(r.mensaje && /restringido/i.test(r.mensaje)){ localStorage.removeItem(PWD_KEY); location.reload(); } return; }
  conversaciones = r.conversaciones;
  pintarLista();
}

function pintarLista(){
  const filtro = $('buscar').value.trim().toLowerCase();
  const cont = $('chats');
  const visibles = conversaciones.filter(c => {
    if(!filtro) return true;
    return (c.nombre_perfil||'').toLowerCase().includes(filtro) || (c.telefono||'').includes(filtro);
  });
  cont.innerHTML = visibles.map(c => `
    <div class="chat-item ${c.telefono===actual?'activo':''}" onclick="abrir('${esc(c.telefono)}')">
      <div class="avatar">${esc(inicial(c))}</div>
      <div class="info">
        <div class="nom">${esc(c.nombre_perfil || c.telefono)}</div>
        <div class="prev">${esc(c.ultimo_mensaje || '')}</div>
      </div>
      <div class="meta">
        <div class="hora">${hora(c.ultimo_at)}</div>
        ${c.no_leidos > 0 ? `<div class="badge">${c.no_leidos}</div>` : ''}
      </div>
    </div>`).join('') || '<div style="padding:30px;text-align:center;color:#667781;font-size:0.88rem">Aún no hay conversaciones</div>';
}

$('buscar').oninput = pintarLista;

/* ── Abrir un chat ── */
window.abrir = async function(telefono){
  actual = telefono;
  $('app').classList.add('viendo-chat');
  $('vacio').style.display = 'none';
  $('convReal').style.display = 'flex';
  const c = conversaciones.find(x => x.telefono === telefono) || { telefono };
  $('convAvatar').textContent = inicial(c);
  $('convNom').textContent = c.nombre_perfil || c.telefono;
  $('convSub').textContent = '+' + (c.telefono || '');
  // aviso de ventana de 24h
  const venc = c.ventana_vence_at ? new Date(c.ventana_vence_at) : null;
  $('aviso24').style.display = (venc && venc < new Date()) ? 'block' : 'none';
  pintarLista();
  await cargarMensajes(true);
  clearInterval(timerChat);
  timerChat = setInterval(() => cargarMensajes(false), 4000);
};

window.cerrarChat = function(){
  actual = null;
  clearInterval(timerChat);
  $('app').classList.remove('viendo-chat');
  $('convReal').style.display = 'none';
  $('vacio').style.display = 'flex';
  pintarLista();
};

async function cargarMensajes(scroll){
  if(!actual) return;
  const r = await api('mensajes', { telefono: actual });
  if(r.status !== 'ok') return;
  const cont = $('msgs');
  const abajo = cont.scrollHeight - cont.scrollTop - cont.clientHeight < 80;
  cont.innerHTML = r.mensajes.map(m => {
    const cuerpo = m.tipo === 'text' || !m.tipo
      ? esc(m.texto || '')
      : `[${esc(m.tipo)}]${m.texto ? ' ' + esc(m.texto) : ''}`;
    const claseMedio = (m.tipo && m.tipo !== 'text') ? ' medio' : '';
    const estado = m.direccion === 'saliente' ? estadoIcono(m.estado_envio) : '';
    return `<div class="b ${m.direccion==='entrante'?'ent':'sal'}${claseMedio}">${cuerpo}<div class="h">${hora(m.timestamp_wa || m.created_at)} ${estado}</div></div>`;
  }).join('');
  if(scroll || abajo) cont.scrollTop = cont.scrollHeight;
}

function estadoIcono(e){
  return ({ enviado:'✓', entregado:'✓✓', leido:'✓✓ (leído)', fallido:'⚠️ falló', recibido:'' }[e]) || '';
}

/* ── Enviar ── */
async function enviarMsg(){
  const txt = $('texto').value.trim();
  if(!txt || !actual) return;
  $('enviar').disabled = true;
  const r = await api('enviar', { telefono: actual, texto: txt });
  $('enviar').disabled = false;
  if(r.status === 'ok'){
    $('texto').value = '';
    $('texto').style.height = 'auto';
    await cargarMensajes(true);
    cargarLista();
  } else {
    alert('No se pudo enviar: ' + (r.mensaje || 'error'));
  }
}
$('enviar').onclick = enviarMsg;
$('texto').addEventListener('keydown', e => {
  if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); enviarMsg(); }
});
$('texto').addEventListener('input', function(){ this.style.height='auto'; this.style.height = Math.min(this.scrollHeight,120)+'px'; });

/* ── Inicio ── */
if(localStorage.getItem(PWD_KEY) && localStorage.getItem(NAME_KEY)){
  arrancar();
} else {
  $('login').style.display = 'flex';
}
</script>
</body>
</html>
