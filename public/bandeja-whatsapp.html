<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <title>Bandeja — Los Plata</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #0A0A0A; --ink-soft: #2E2E2E; --ink-mute: #6E6E6E;
      --gray-400: #8A8A8A; --gray-300: #C9C7BE; --gray-200: #E5E3DA; --gray-100: #EEEEEE;
      --cream-50: #FAFAF7; --cream-100: #F2F1EC; --cream-200: #E5E3DA;
      --mint: #9BFAB0; --mint-light: #C4FBD0; --mint-dark: #6FE08C;
      --danger: #9E3B3B;
      --serif: 'Cormorant Garamond', Garamond, serif;
      --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    }
    html, body { height: 100%; font-family: var(--sans); color: var(--ink); -webkit-font-smoothing: antialiased; }
    body { display: flex; overflow: hidden; background: var(--cream-50); }

    /* ── Acceso ── */
    #login {
      position: fixed; inset: 0; z-index: 100; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 14px; background: var(--cream-50); padding: 24px;
    }
    #login img { height: 96px; width: auto; margin-bottom: 6px; }
    #login .t { font-weight: 700; font-size: 1.7rem; letter-spacing: -0.02em; color: var(--ink); }
    #login p { color: var(--ink-mute); letter-spacing: 0.16em; text-transform: uppercase; font-size: 0.72rem; margin-bottom: 10px; }
    #login input {
      width: 100%; max-width: 360px; padding: 14px 18px; border-radius: 12px;
      border: 1px solid var(--gray-200); background: #fff; font-family: inherit; font-size: 0.95rem; color: var(--ink); outline: none;
    }
    #login input:focus { border-color: var(--ink); }
    #login button {
      width: 100%; max-width: 360px; padding: 14px; border-radius: 12px; border: none;
      background: var(--mint); color: var(--ink); font-weight: 600; font-family: inherit; font-size: 0.95rem; cursor: pointer; transition: background .15s;
    }
    #login button:hover { background: var(--mint-light); }
    #loginMsg { color: var(--danger); font-size: 0.82rem; min-height: 18px; }

    /* ── Estructura ── */
    #app { display: none; width: 100%; height: 100%; }
    #app.ready { display: flex; }

    /* Columna izquierda · lista */
    #lista { width: 360px; min-width: 360px; height: 100%; background: #fff; border-right: 1px solid var(--gray-200); display: flex; flex-direction: column; }
    #lista header { padding: 18px 20px 14px; border-bottom: 1px solid var(--gray-100); display: flex; align-items: flex-end; justify-content: space-between; gap: 10px; }
    #lista header .t { font-weight: 700; font-size: 1.25rem; letter-spacing: -0.02em; line-height: 1; color: var(--ink); }
    #lista header .u { font-size: 0.66rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-mute); margin-top: 4px; }
    #salir { background: none; color: var(--ink-mute); border: 1px solid var(--gray-200); border-radius: 100px; padding: 6px 14px; font-family: inherit; font-size: 0.74rem; cursor: pointer; transition: .15s; }
    #salir:hover { color: var(--ink); border-color: var(--gray-300); }
    /* Menú de navegación (izquierda, fijo) */
    #nav { width: 212px; min-width: 212px; height: 100%; background: #fff; border-right: 1px solid var(--gray-200); display: flex; flex-direction: column; }
    .nav-top { padding: 16px 16px 12px; border-bottom: 1px solid var(--gray-100); }
    .nav-title { font-weight: 700; font-size: 1.2rem; letter-spacing: -0.02em; margin-bottom: 10px; }
    #selLinea { display: none; width: 100%; padding: 9px 12px; border: 1px solid var(--gray-200); border-radius: 10px; background: var(--cream-50); font-family: inherit; font-size: 0.82rem; font-weight: 500; color: var(--ink); outline: none; cursor: pointer; }
    .nav-items { flex: 1; padding: 10px; display: flex; flex-direction: column; gap: 4px; overflow-y: auto; }
    .nav-item { display: flex; align-items: center; gap: 11px; padding: 10px 12px; border: none; background: none; border-radius: 10px; font-family: inherit; font-size: 0.9rem; color: var(--ink-mute); cursor: pointer; text-align: left; }
    .nav-item:hover { background: var(--cream-50); }
    .nav-item.on { background: var(--cream-100); color: var(--ink); font-weight: 600; }
    .nav-item.on svg { color: var(--ink); }
    .nav-foot { padding: 12px 16px; border-top: 1px solid var(--gray-100); }
    .nav-user { font-size: 0.64rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-mute); margin-bottom: 8px; }
    .nav-foot #salir { width: 100%; background: none; color: var(--ink-mute); border: 1px solid var(--gray-200); border-radius: 100px; padding: 8px; font-family: inherit; font-size: 0.78rem; cursor: pointer; }
    .nav-foot #salir:hover { color: var(--ink); border-color: var(--gray-300); }
    .nav-head { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    #navToggle { background: none; border: none; cursor: pointer; padding: 4px; color: var(--ink); display: flex; border-radius: 8px; }
    #navToggle:hover { background: var(--cream-100); }
    .nav-foot #salir { display: flex; align-items: center; justify-content: center; gap: 8px; }
    /* Menú contraído: solo íconos */
    #nav.colapsado { width: 60px; min-width: 60px; }
    #nav.colapsado .nav-title, #nav.colapsado .nav-user, #nav.colapsado #selLinea, #nav.colapsado .nav-item span, #nav.colapsado #salir span { display: none; }
    #nav.colapsado .nav-item { justify-content: center; padding: 12px 0; }
    #nav.colapsado .nav-head { justify-content: center; margin-bottom: 0; }
    #nav.colapsado .nav-top { padding: 12px 8px; }
    #nav.colapsado .nav-foot { padding: 10px 8px; }
    /* Módulos */
    #modChats { flex: 1; display: flex; min-width: 0; }
    #modContactos { flex: 1; display: none; flex-direction: column; min-width: 0; background: var(--cream-50); overflow: hidden; }
    .cont-head { background: #fff; border-bottom: 1px solid var(--gray-200); padding: 16px 24px; }
    .cont-head h2 { font-size: 1.15rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 12px; }
    .cont-actions { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    #buscarContacto { flex: 1; min-width: 200px; padding: 10px 16px; border: 1px solid var(--gray-200); border-radius: 10px; background: var(--cream-50); font-family: inherit; font-size: 0.88rem; color: var(--ink); outline: none; }
    #buscarContacto:focus { border-color: var(--gray-300); background: #fff; }
    .cont-actions button { padding: 10px 16px; border: 1px solid var(--gray-200); background: #fff; border-radius: 10px; font-family: inherit; font-size: 0.84rem; color: var(--ink); cursor: pointer; }
    #btnCrearContacto { background: var(--mint) !important; border-color: var(--mint) !important; font-weight: 600; }
    #btnCrearContacto:hover { background: var(--mint-light) !important; }
    #btnImportar:hover { background: var(--cream-50); }
    #listaContactos { flex: 1; overflow-y: auto; padding: 10px 16px 20px; }
    #listaContactos .chat-item { background: #fff; border: 1px solid var(--gray-100); border-radius: 12px; margin-bottom: 8px; border-bottom: 1px solid var(--gray-100); }
    #listaContactos .chat-item:hover { background: var(--cream-50); }
    #buscar { margin: 12px 16px; padding: 10px 16px; border-radius: 10px; border: 1px solid transparent; background: var(--cream-100); font-family: inherit; font-size: 0.86rem; color: var(--ink); outline: none; }
    #buscar:focus { border-color: var(--gray-200); background: #fff; }
    #buscar::placeholder { color: var(--gray-400); }
    #filtroSinResp { margin: 0 16px 10px; align-self: flex-start; padding: 7px 14px; border: 1px solid var(--gray-200); background: #fff; border-radius: 100px; font-family: inherit; font-size: 0.8rem; color: var(--ink-mute); cursor: pointer; display: flex; align-items: center; gap: 7px; transition: .15s; }
    #filtroSinResp:hover { border-color: var(--gray-300); }
    #filtroSinResp.on { background: var(--mint); color: var(--ink); border-color: var(--mint); font-weight: 600; }
    #filtroSinResp .cnt { background: rgba(0,0,0,0.10); border-radius: 100px; padding: 1px 8px; font-size: 0.72rem; min-width: 18px; text-align: center; }
    #tabs { display: flex; gap: 6px; margin: 12px 16px 0; }
    .tab { flex: 1; padding: 8px; border: 1px solid var(--gray-200); background: #fff; border-radius: 8px; font-family: inherit; font-size: 0.84rem; color: var(--ink-mute); cursor: pointer; }
    .tab.on { background: var(--cream-100); color: var(--ink); font-weight: 600; border-color: var(--gray-300); }
    #accContactos { display: none; gap: 8px; margin: 0 16px 8px; }
    #accContactos.show { display: flex; }
    #accContactos button { flex: 1; padding: 8px; border: 1px solid var(--gray-200); background: #fff; border-radius: 8px; font-family: inherit; font-size: 0.8rem; color: var(--ink); cursor: pointer; }
    #accContactos button:hover { background: var(--cream-50); }
    .cargarmas { display: block; margin: 12px auto; padding: 9px 16px; border: 1px solid var(--gray-200); background: #fff; border-radius: 8px; font-family: inherit; font-size: 0.82rem; cursor: pointer; color: var(--ink); }
    .cargarmas:hover { background: var(--cream-50); }
    .cc-input { width: 100%; margin-bottom: 10px; padding: 11px 14px; border: 1px solid var(--gray-200); border-radius: 10px; font-family: inherit; font-size: 0.9rem; color: var(--ink); outline: none; }
    .cc-input:focus { border-color: var(--ink); }
    #chats { flex: 1; overflow-y: auto; }
    .chat-item { display: flex; gap: 13px; align-items: center; padding: 13px 18px; cursor: pointer; border-bottom: 1px solid var(--gray-100); border-left: 3px solid transparent; transition: background .12s; }
    .chat-item:hover { background: var(--cream-50); }
    .chat-item.activo { background: var(--cream-100); border-left-color: var(--mint-dark); }
    .avatar { width: 44px; height: 44px; min-width: 44px; border-radius: 50%; background: var(--cream-100); color: var(--ink-soft); display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 1rem; letter-spacing: 0.01em; }
    .chat-item .info { flex: 1; min-width: 0; }
    .chat-item .nom { font-weight: 500; font-size: 0.9rem; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chat-item .prev { color: var(--ink-mute); font-size: 0.8rem; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chat-item .meta { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
    .chat-item .hora { color: var(--gray-400); font-size: 0.68rem; }
    .badge { background: var(--mint); color: var(--ink); border-radius: 100px; min-width: 19px; height: 19px; padding: 0 6px; font-size: 0.68rem; display: flex; align-items: center; justify-content: center; font-weight: 600; }
    .vacio-lista { padding: 36px 20px; text-align: center; color: var(--gray-400); font-size: 0.84rem; }

    /* Columna central · conversación */
    #conv { flex: 1; height: 100%; display: flex; flex-direction: column; background: var(--cream-50); min-width: 0; }
    #convHead { background: #fff; border-bottom: 1px solid var(--gray-200); padding: 12px 20px; display: flex; align-items: center; gap: 13px; }
    #convHead .volver { display: none; background: none; border: none; color: var(--ink); font-size: 1.3rem; cursor: pointer; padding: 0 4px 0 0; }
    #convHead .nom { font-weight: 600; font-size: 0.95rem; color: var(--ink); }
    #convHead .sub { font-size: 0.74rem; color: var(--ink-mute); margin-top: 1px; }
    #vacio { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--gray-400); text-align: center; padding: 20px; flex-direction: column; gap: 14px; }
    #vacio .txt { font-size: 0.92rem; color: var(--ink-mute); max-width: 260px; line-height: 1.5; }
    #msgs { flex: 1; overflow-y: auto; padding: 24px 9%; display: flex; flex-direction: column; gap: 7px; }
    .b { max-width: 68%; padding: 9px 13px; border-radius: 14px; font-size: 0.9rem; line-height: 1.42; word-wrap: break-word; white-space: pre-wrap; }
    .b.ent { align-self: flex-start; background: #fff; border: 1px solid var(--gray-200); color: var(--ink); border-bottom-left-radius: 4px; }
    .b.sal { align-self: flex-end; background: var(--ink); color: var(--cream-50); border-bottom-right-radius: 4px; }
    .b .h { font-size: 0.62rem; text-align: right; margin-top: 4px; }
    .b.ent .h { color: var(--gray-400); }
    .b.sal .h { color: rgba(250,250,247,0.5); }
    .b.medio { color: var(--ink-mute); }
    .media { min-width: 150px; font-size: 0.82rem; color: inherit; opacity: 0.85; }
    .media img { width: 200px; height: 200px; object-fit: cover; border-radius: 10px; cursor: pointer; display: block; }
    .media video { max-width: 250px; border-radius: 10px; cursor: pointer; display: block; }
    .media audio { max-width: 250px; }
    .media a { color: inherit; text-decoration: underline; }
    .cap { margin-top: 5px; }
    #aviso24 { display: none; background: var(--cream-100); color: var(--ink-soft); border-bottom: 1px solid var(--gray-200); text-align: center; font-size: 0.78rem; padding: 9px 16px; }

    /* Columna derecha · ficha */
    #panel { width: 320px; min-width: 320px; background: var(--cream-50); border-left: 1px solid var(--gray-200); overflow-y: auto; display: none; }
    .pcard { background: #fff; margin: 14px; border: 1px solid var(--gray-200); border-radius: 14px; padding: 18px; }
    .pavatar { width: 64px; height: 64px; border-radius: 50%; background: var(--cream-100); color: var(--ink-soft); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: 600; margin: 0 auto 12px; }
    .pnombre { text-align: center; font-weight: 600; font-size: 1rem; color: var(--ink); }
    .ptel { text-align: center; color: var(--ink-mute); font-size: 0.8rem; margin-top: 3px; }
    .plabel { font-size: 0.62rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gray-400); }
    .prow { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--gray-100); }
    .prow b { font-weight: 500; font-size: 0.86rem; color: var(--ink); text-align: right; }
    .pdeuda { background: var(--cream-100); border-radius: 10px; padding: 14px; margin: 14px 0; text-align: center; }
    .pdeuda .val { font-weight: 700; font-size: 1.5rem; letter-spacing: -0.02em; color: var(--ink); margin-top: 4px; }
    .psub { font-size: 0.62rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gray-400); margin: 16px 0 4px; }
    .pbol { display: flex; justify-content: space-between; align-items: baseline; padding: 9px 0; border-top: 1px solid var(--gray-100); font-size: 0.85rem; }
    .pbol a { color: var(--ink); text-decoration: none; border-bottom: 1px solid var(--gray-300); }
    .pbol a:hover { border-color: var(--ink); }
    .pbol b { font-weight: 500; }
    .pbol-head { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; }
    .pbol-head a { font-weight: 600; font-size: 0.95rem; color: var(--ink); text-decoration: none; border-bottom: 1px solid var(--gray-300); }
    .pbol-head a:hover { border-color: var(--ink); }
    .pbol-head b { font-weight: 600; font-size: 0.95rem; }
    .ppago { display: flex; justify-content: space-between; align-items: center; gap: 10px; padding: 9px 0; border-top: 1px solid var(--gray-100); font-size: 0.85rem; }
    .ppago b { font-weight: 500; }
    .pfecha { color: var(--ink); }
    .pmeta { color: var(--ink-mute); font-size: 0.74rem; margin-top: 2px; }
    .pp-right { display: flex; align-items: center; gap: 8px; }
    .pp-del { background: none; border: none; padding: 4px; color: var(--gray-300); cursor: pointer; display: flex; border-radius: 6px; }
    .pp-del:hover { color: var(--danger); background: #fdecec; }
    .pmuted { color: var(--gray-400); text-align: center; font-size: 0.86rem; }
    .pnuevo { text-align: center; color: var(--ink-mute); font-size: 0.88rem; line-height: 1.6; }
    .pnuevo b { color: var(--ink); font-weight: 600; }
    .pnuevo span { font-size: 0.78rem; color: var(--gray-400); }
    @media (min-width: 1101px){ #app.chat-abierto #panel { display: block; } }

    /* Barra de envío */
    #barra { display: flex; gap: 10px; padding: 14px 18px; background: #fff; border-top: 1px solid var(--gray-200); align-items: flex-end; }
    #texto { flex: 1; resize: none; max-height: 120px; padding: 11px 16px; border-radius: 14px; border: 1px solid var(--gray-200); background: var(--cream-50); font-family: inherit; font-size: 0.92rem; color: var(--ink); outline: none; line-height: 1.4; }
    #texto:focus { border-color: var(--gray-300); background: #fff; }
    #texto::placeholder { color: var(--gray-400); }
    #enviar { width: 46px; height: 46px; min-width: 46px; border-radius: 50%; border: none; background: var(--mint); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .15s; }
    #enviar:hover { background: var(--mint-light); }
    #enviar:disabled { opacity: 0.45; cursor: default; }

    /* Menú contextual (clic derecho) */
    #ctxMenu { position: fixed; z-index: 200; background: #fff; border: 1px solid var(--gray-200); border-radius: 10px; box-shadow: 0 8px 24px rgba(0,0,0,.12); padding: 5px; display: none; }
    #ctxMenu button { display: block; width: 100%; text-align: left; background: none; border: none; padding: 9px 14px; font-family: inherit; font-size: 0.86rem; color: var(--ink); cursor: pointer; border-radius: 7px; white-space: nowrap; }
    #ctxMenu button:hover { background: var(--cream-100); }

    /* Ventana de verificación del pago */
    #modalBg { position: fixed; inset: 0; z-index: 300; background: rgba(10,10,10,.45); display: none; align-items: center; justify-content: center; padding: 20px; }
    #modalBg.show { display: flex; }
    .modal { background: #fff; border-radius: 16px; max-width: 460px; width: 100%; max-height: 86vh; overflow-y: auto; padding: 22px; }
    .modal h3 { font-size: 1.05rem; font-weight: 700; letter-spacing: -0.01em; margin-bottom: 4px; }
    .modal .msub { color: var(--ink-mute); font-size: 0.82rem; margin-bottom: 16px; line-height: 1.45; }
    .mblock { border: 1px solid var(--gray-200); border-radius: 12px; padding: 14px; margin-bottom: 12px; }
    .mblock.cliente { background: var(--cream-50); }
    .mhdr { font-size: 0.62rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gray-400); margin-bottom: 8px; }
    .mrow { display: flex; justify-content: space-between; gap: 10px; padding: 4px 0; font-size: 0.86rem; }
    .mrow span { color: var(--ink-mute); }
    .mrow b { font-weight: 500; }
    .cand { border: 1px solid var(--gray-200); border-radius: 12px; padding: 12px 14px; margin-bottom: 10px; }
    .cand.sug { border-color: var(--mint-dark); background: #f3fcf5; }
    .cand .tag { display: inline-block; font-size: 0.6rem; letter-spacing: 0.06em; text-transform: uppercase; background: var(--mint); color: var(--ink); padding: 3px 9px; border-radius: 100px; margin-bottom: 8px; font-weight: 600; }
    .cand .razon { font-size: 0.72rem; color: var(--ink-mute); margin-top: 6px; }
    .estado-libre { color: #1f8a4c; }
    .estado-asig { color: var(--danger); }
    .aviso-asig { margin-top: 9px; background: #fdecec; color: var(--danger); border-radius: 8px; padding: 9px 11px; font-size: 0.76rem; line-height: 1.4; }
    /* Tarjeta compacta de transferencia (estilo Admin) */
    .tmain { font-weight: 600; font-size: 0.92rem; color: var(--ink); }
    .tsub { font-size: 0.76rem; color: var(--ink-mute); margin-top: 3px; }
    .testado { font-size: 0.8rem; font-weight: 500; margin-top: 7px; }
    .tfoto { display: inline-block; margin-top: 9px; font-size: 0.76rem; color: var(--ink); border: 1px solid var(--gray-200); border-radius: 100px; padding: 5px 13px; text-decoration: none; cursor: pointer; }
    .tfoto:hover { background: var(--cream-50); }
    /* Visor de foto (lightbox) */
    #fotoBg { position: fixed; inset: 0; z-index: 400; background: rgba(10,10,10,.85); display: none; align-items: center; justify-content: center; padding: 20px; }
    #fotoBg.show { display: flex; }
    .vimg { max-width: 92vw; max-height: 90vh; border-radius: 12px; box-shadow: 0 12px 40px rgba(0,0,0,.45); }
    .cmp { display: flex; gap: 18px; align-items: flex-start; }
    .cmp-col { display: flex; flex-direction: column; align-items: center; gap: 9px; }
    .cmp-lbl { color: rgba(255,255,255,.85); font-size: 0.74rem; letter-spacing: 0.08em; text-transform: uppercase; }
    .cmp-col img { max-width: 44vw; max-height: 80vh; border-radius: 10px; box-shadow: 0 12px 40px rgba(0,0,0,.45); object-fit: contain; }
    .cmp-none { color: #9a9a9a; font-size: 0.85rem; padding: 50px 30px; }
    @media (max-width: 760px){ .cmp { flex-direction: column; overflow-y: auto; max-height: 90vh; } .cmp-col img { max-width: 86vw; max-height: 60vh; } }
    .mnone { text-align: center; color: var(--ink-mute); font-size: 0.88rem; padding: 14px; line-height: 1.55; }
    .mcerrar { width: 100%; margin-top: 6px; padding: 12px; border: 1px solid var(--gray-200); background: #fff; border-radius: 12px; font-family: inherit; font-size: 0.9rem; color: var(--ink); cursor: pointer; }
    .mcerrar:hover { background: var(--cream-50); }
    .mcargando { text-align: center; padding: 34px 14px; color: var(--ink-mute); font-size: 0.9rem; }
    .mabonar { display: block; width: 100%; margin-top: 11px; padding: 11px; border: none; border-radius: 10px; background: var(--mint); color: var(--ink); font-family: inherit; font-weight: 600; font-size: 0.86rem; cursor: pointer; }
    .mabonar:hover { background: var(--mint-light); }
    .mboleta { display: block; width: 100%; margin-bottom: 9px; padding: 12px 14px; border: 1px solid var(--gray-200); border-radius: 10px; background: #fff; font-family: inherit; font-size: 0.88rem; color: var(--ink); cursor: pointer; text-align: left; }
    .mboleta:hover { background: var(--cream-50); border-color: var(--gray-300); }
    .mexceso { border-color: var(--danger); color: var(--danger); font-weight: 500; }
    .aviso-reparto { background: #fdecec; color: var(--danger); border-radius: 10px; padding: 13px 15px; font-weight: 600; font-size: 0.98rem; line-height: 1.4; margin-bottom: 10px; }
    .ab-tabs { display: flex; gap: 8px; margin-bottom: 12px; }
    .ab-tab { flex: 1; padding: 8px; border: 1px solid var(--gray-200); background: #fff; border-radius: 8px; font-family: inherit; font-size: 0.82rem; cursor: pointer; color: var(--ink-mute); }
    .ab-tab.on { background: var(--cream-100); color: var(--ink); font-weight: 600; border-color: var(--gray-300); }
    .ab-igual { display: block; width: 100%; margin-bottom: 10px; padding: 9px; border: 1px solid var(--gray-200); background: #fff; border-radius: 8px; font-family: inherit; font-size: 0.82rem; cursor: pointer; color: var(--ink); }
    .ab-igual:hover { background: var(--cream-50); }
    .rep-row { display: flex; justify-content: space-between; align-items: center; gap: 10px; padding: 9px 0; border-top: 1px solid var(--gray-100); font-size: 0.85rem; }
    .rep-row small { color: var(--ink-mute); }
    .rep-input { width: 120px; padding: 8px 10px; border: 1px solid var(--gray-200); border-radius: 8px; font-family: inherit; font-size: 0.88rem; text-align: right; outline: none; }
    .rep-input:focus { border-color: var(--ink); }
    .rep-total { text-align: right; font-size: 0.85rem; margin: 11px 0; color: var(--ink-mute); }
    .rep-total.ok { color: #1f8a4c; font-weight: 600; }
    .rep-total.bad { color: var(--danger); font-weight: 600; }
    .ab-confirm { display: block; width: 100%; margin-top: 4px; padding: 11px; border: none; border-radius: 10px; background: var(--mint); color: var(--ink); font-family: inherit; font-weight: 600; font-size: 0.86rem; cursor: pointer; }
    .ab-confirm:disabled { opacity: 0.45; cursor: default; }

    @media (max-width: 1100px) { #lista { width: 320px; min-width: 320px; } }
    @media (max-width: 820px) {
      #nav { width: 58px; min-width: 58px; }

<body>

<script>
const PWD_KEY = 'asesor_pwd', NAME_KEY = 'asesor_nombre';
let actual = null;        // telefono del chat abierto
let conversaciones = [];
let timerLista = null, timerChat = null;
let firmaMsgs = '';
let soloSinRespuesta = false; // filtro: solo chats donde el último mensaje fue del cliente
let lineas = [];              // líneas de WhatsApp disponibles
let lineaActual = null;       // línea seleccionada (phone_number_id)
let actualLinea = null;       // línea del chat abierto
let vista = 'chats';          // 'chats' | 'contactos'
let contactosPage = 0, contactosTotal = 0, timerBuscar = null;
let comprobanteMid = null;   // media_id del comprobante del cliente que se está verificando
let verifActual = null;      // resultado de la última verificación (incluye boletas del cliente)
let abonoCtx = null;         // { id, monto, ref, plat } de la transferencia que se va a abonar

const $ = id => document.getElementById(id);
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
const pesos = v => '$' + Number(v || 0).toLocaleString('es-CO');

async function api(path, body){
  const r = await fetch('/api/whatsapp/' + path, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ contrasena: localStorage.getItem(PWD_KEY), ...body })
  });
  return r.json();
}

/* ── Acceso ── */
$('btnLogin').onclick = async () => {
  const pwd = $('loginPwd').value.trim();
  if(!pwd) return;
  const r = await fetch('/api/admin/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ contrasena: pwd }) }).then(r=>r.json());
  if(r.status === 'ok'){
    localStorage.setItem(PWD_KEY, pwd);
    localStorage.setItem(NAME_KEY, r.asesor);
    arrancar();
  } else {
    $('loginMsg').textContent = 'Contraseña incorrecta';
  }
};

$('salir').onclick = () => { localStorage.removeItem(PWD_KEY); location.reload(); };

$('navToggle').onclick = () => {
  const col = $('nav').classList.toggle('colapsado');
  localStorage.setItem('nav_colapsado', col ? '1' : '0');
};

async function arrancar(){
  $('login').style.display = 'none';
  $('app').classList.add('ready');
  if(localStorage.getItem('nav_colapsado') === '1') $('nav').classList.add('colapsado');
  $('quien').textContent = localStorage.getItem(NAME_KEY) || '';
  await cargarLineas();
  cargarLista();
  timerLista = setInterval(cargarLista, 5000);
}

async function cargarLineas(){
  const r = await api('lineas', {});
  lineas = (r && r.lineas) ? r.lineas : [];
  const sel = $('selLinea');
  if(lineas.length){
    const guardada = localStorage.getItem('wa_linea');
    lineaActual = (guardada && lineas.some(l => l.phone_number_id === guardada)) ? guardada : lineas[0].phone_number_id;
    sel.innerHTML = lineas.map(l => `<option value="${esc(l.phone_number_id)}">${esc(l.nombre)}</option>`).join('');
    sel.value = lineaActual;
    sel.style.display = lineas.length > 1 ? 'block' : 'none';
  } else {
    lineaActual = null;
    sel.style.display = 'none';
  }
}
$('selLinea').onchange = () => {
  lineaActual = $('selLinea').value;
  localStorage.setItem('wa_linea', lineaActual);
  cerrarChat();
  if(vista === 'contactos') cargarContactos(true); else cargarLista();
};

/* ── Lista de conversaciones ── */
function hora(iso){
  if(!iso) return '';
  const d = new Date(iso), hoy = new Date();
  const mismoDia = d.toDateString() === hoy.toDateString();
  return mismoDia ? d.toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'}) : d.toLocaleDateString('es-CO',{day:'2-digit',month:'2-digit'});
}
function inicial(c){ const n = c.nombre_perfil || c.telefono || '?'; return n.trim().charAt(0).toUpperCase(); }

async function cargarLista(){
  const r = await api('conversaciones', { soloSinRespuesta, linea_id: lineaActual });
  if(r.status !== 'ok'){ if(r.mensaje && /restringido/i.test(r.mensaje)){ localStorage.removeItem(PWD_KEY); location.reload(); } return; }
  conversaciones = r.conversaciones;
  if(typeof r.sinRespuestaTotal === 'number') $('cntSinResp').textContent = r.sinRespuestaTotal;
  if(vista === 'chats') pintarLista();
}

$('filtroSinResp').onclick = () => {
  soloSinRespuesta = !soloSinRespuesta;
  $('filtroSinResp').classList.toggle('on', soloSinRespuesta);
  cargarLista();
};

function pintarLista(){
  const filtro = $('buscar').value.trim().toLowerCase();
  const cont = $('chats');
  const visibles = conversaciones.filter(c => {
    if(!filtro) return true;
    return (c.nombre_perfil||'').toLowerCase().includes(filtro) || (c.telefono||'').includes(filtro);
  });
  cont.innerHTML = visibles.map(c => `
    <div class="chat-item ${c.telefono===actual?'activo':''}" onclick="abrir('${esc(c.telefono)}')">
      <div class="avatar">${esc(inicial(c))}</div>
      <div class="info">
        <div class="nom">${esc(c.nombre_perfil || c.telefono)}</div>
        <div class="prev">${esc(c.ultimo_mensaje || '')}</div>
      </div>
      <div class="meta">
        <div class="hora">${hora(c.ultimo_at)}</div>
        ${c.no_leidos > 0 ? `<div class="badge">${c.no_leidos}</div>` : ''}
      </div>
    </div>`).join('') || '<div class="vacio-lista">Aún no hay conversaciones</div>';
}

$('buscar').oninput = () => pintarLista();
$('buscarContacto').oninput = () => { clearTimeout(timerBuscar); timerBuscar = setTimeout(() => { contactosPage = 0; cargarContactos(true); }, 350); };

/* ── Abrir un chat ── */
window.abrir = async function(telefono, nombrePerfil){
  actual = telefono;
  firmaMsgs = '';
  $('msgs').innerHTML = '';
  $('app').classList.add('viendo-chat');
  $('app').classList.add('chat-abierto');
  $('vacio').style.display = 'none';
  $('convReal').style.display = 'flex';
  const c = conversaciones.find(x => x.telefono === telefono) || { telefono, nombre_perfil: nombrePerfil || telefono, linea_id: lineaActual };
  actualLinea = c.linea_id || lineaActual;
  $('convAvatar').textContent = inicial(c);
  $('convNom').textContent = c.nombre_perfil || c.telefono;
  $('convSub').textContent = '+' + (c.telefono || '');
  const venc = c.ventana_vence_at ? new Date(c.ventana_vence_at) : null;
  $('aviso24').style.display = (venc && venc < new Date()) ? 'block' : 'none';
  pintarLista();
  cargarFicha(telefono);
  await cargarMensajes(true);
  clearInterval(timerChat);
  timerChat = setInterval(() => cargarMensajes(false), 4000);
};

window.cerrarChat = function(){
  actual = null;
  clearInterval(timerChat);
  $('app').classList.remove('viendo-chat');
  $('app').classList.remove('chat-abierto');
  $('convReal').style.display = 'none';
  $('panel').innerHTML = '';
  $('vacio').style.display = 'flex';
  pintarLista();
};

/* ── Ficha del cliente (panel derecho) ── */
async function cargarFicha(telefono){
  const p = $('panel');
  p.innerHTML = '<div class="pcard"><div class="pmuted">Buscando cliente…</div></div>';
  const r = await api('cliente', { telefono });
  if(telefono !== actual) return;
  const c = conversaciones.find(x => x.telefono === telefono) || { telefono };

  const nombreTit = (r.status==='ok' && r.encontrado && (r.nombre || r.apellido))
    ? [r.nombre, r.apellido].filter(Boolean).join(' ')
    : (c.nombre_perfil || telefono);

  // Tarjeta del cliente (siempre): foto, nombre, teléfono, y si existe: ciudad, documento, saldo total
  const datosCliente = (r.status==='ok' && r.encontrado) ? `
      <div class="prow" style="margin-top:16px"><span class="plabel">Ciudad</span><b>${esc(r.ciudad || '—')}</b></div>
      <div class="prow"><span class="plabel">Documento</span><b>${esc(r.documento || '—')}</b></div>
      <div class="prow"><span class="plabel">Correo</span><b>${esc(r.correo || '—')}</b></div>
      <div class="prow" style="border-bottom:none"><span class="plabel">Saldo total</span><b>${pesos(r.deuda)}</b></div>` : '';
  const cardCliente = `
    <div class="pcard">
      <div class="pavatar">${esc(inicial(c))}</div>
      <div class="pnombre">${esc(nombreTit)}</div>
      <div class="ptel">+${esc(telefono)}</div>
      ${datosCliente}
    </div>`;

  // Una tarjeta por boleta, cada una con su saldo y su propio historial de pagos
  let resto;
  if(r.status==='ok' && r.encontrado){
    resto = r.boletas.map(tarjetaBoleta).join('');
  } else if(r.status==='ok' && !r.encontrado){
    resto = `<div class="pcard"><div class="pnuevo"><b>Cliente nuevo</b><br><span>No tiene boletas registradas con este número.</span></div></div>`;
  } else {
    resto = `<div class="pcard"><div class="pmuted">No se pudo cargar la ficha.</div></div>`;
  }

  p.innerHTML = cardCliente + resto;
}

function tarjetaBoleta(b){
  const pagos = (b.pagos || []).map(p => {
    const f = p.fecha_pago ? new Date(p.fecha_pago).toLocaleDateString('es-CO', { day:'2-digit', month:'2-digit', year:'numeric' }) : '—';
    const ref = String(p.referencia_transferencia || '').trim();
    const esRefReal = ref && !['sin ref','efectivo','efectivo_oficina','0','pendiente'].includes(ref.toLowerCase());
    const principal = esRefReal ? ('Ref ' + esc(ref)) : esc(p.metodo_pago || 'Efectivo');
    const basurero = `<button class="pp-del" data-id="${esc(p.id)}" data-monto="${p.monto}" title="Eliminar abono"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>`;
    return `<div class="ppago"><div><div class="pfecha">${f}</div><div class="pmeta">${principal} · ${esc(p.asesor || '')}</div></div><div class="pp-right"><b>${pesos(p.monto)}</b>${basurero}</div></div>`;
  }).join('') || '<div class="pmuted" style="text-align:left;padding:8px 0">Sin pagos registrados</div>';
  const saldo = b.saldo > 0 ? pesos(b.saldo) : '<span style="color:#1f8a4c">Pagada</span>';
  return `<div class="pcard">
    <div class="pbol-head"><a href="/boleta/${esc(b.numero)}" target="_blank">Boleta ${esc(b.numero)}</a><b>${saldo}</b></div>
    <div class="psub" style="margin-top:10px">Historial de pagos · ${(b.pagos || []).length}</div>
    ${pagos}
  </div>`;
}

/* ── Mensajes ── */
function cuerpoMensaje(m){
  if(m.tipo === 'text' || !m.tipo) return esc(m.texto || '');
  if(m.media_id){
    const cap = m.texto ? `<div class="cap">${esc(m.texto)}</div>` : '';
    const t = (m.tipo==='image'||m.tipo==='sticker') ? 'img'
            : m.tipo==='audio' ? 'audio'
            : m.tipo==='video' ? 'video' : 'doc';
    const carga = t==='img' ? 'Cargando imagen…' : t==='audio' ? 'Cargando audio…'
                : t==='video' ? 'Cargando video…' : 'Cargando archivo…';
    return `<div class="media" data-mid="${esc(m.media_id)}" data-tipo="${t}">${carga}</div>${cap}`;
  }
  return `(${esc(m.tipo)})${m.texto ? ' ' + esc(m.texto) : ''}`;
}

const mediaCache = {};
async function hidratarMedia(){
  // De abajo hacia arriba: los archivos más nuevos (los de abajo) cargan primero
  const els = Array.from($('msgs').querySelectorAll('.media[data-mid]')).reverse();
  for(const el of els){
    if(el.dataset.cargado) continue;
    el.dataset.cargado = '1';
    const mid = el.getAttribute('data-mid'), tipo = el.getAttribute('data-tipo');
    try{
      let url = mediaCache[mid];
      if(!url){
        const resp = await fetch('/api/whatsapp/media', { method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ contrasena: localStorage.getItem(PWD_KEY), media_id: mid, linea_id: actualLinea }) });
        const ct = resp.headers.get('content-type') || '';
        if(!resp.ok || ct.includes('application/json')){
          el.textContent = 'No se pudo cargar el archivo'; el.dataset.cargado = ''; continue;
        }
        url = URL.createObjectURL(await resp.blob());
        mediaCache[mid] = url;
      }
      if(tipo==='img')        el.innerHTML = `<img src="${url}" onclick="verImagen('${url}')">`;
      else if(tipo==='audio') el.innerHTML = `<audio controls src="${url}"></audio>`;
      else if(tipo==='video') el.innerHTML = `<video controls src="${url}"></video>`;
      else                    el.innerHTML = `<a href="${url}" target="_blank" download>Abrir archivo</a>`;
    }catch(e){ el.textContent = 'Error al cargar'; el.dataset.cargado = ''; }
  }
}

async function cargarMensajes(scroll){
  if(!actual) return;
  const r = await api('mensajes', { telefono: actual, linea_id: actualLinea });
  if(r.status !== 'ok') return;
  const ult = r.mensajes[r.mensajes.length-1];
  const firma = r.mensajes.length + ':' + (ult?.id || '') + ':' + (ult?.estado_envio || '');
  if(!scroll && firma === firmaMsgs) return;
  firmaMsgs = firma;
  const cont = $('msgs');
  const abajo = cont.scrollHeight - cont.scrollTop - cont.clientHeight < 80;
  cont.innerHTML = r.mensajes.map(m => {
    const claseMedio = (m.tipo && m.tipo !== 'text' && !m.media_id) ? ' medio' : '';
    const estado = m.direccion === 'saliente' ? estadoIcono(m.estado_envio) : '';
    return `<div class="b ${m.direccion==='entrante'?'ent':'sal'}${claseMedio}">${cuerpoMensaje(m)}<div class="h">${hora(m.timestamp_wa || m.created_at)}${estado ? ' · ' + estado : ''}</div></div>`;
  }).join('');
  hidratarMedia();
  if(scroll || abajo) cont.scrollTop = cont.scrollHeight;
}

function estadoIcono(e){
  return ({ enviado:'enviado', entregado:'entregado', leido:'leído', fallido:'no enviado', recibido:'' }[e]) || '';
}

function fmtTrans(t){
  const sub = `Ref: ${esc(t.referencia || '—')} · ${esc(t.fecha_pago || '—')}${t.hora_pago ? ' a las ' + esc(t.hora_pago) : ''}`;
  const estado = t.estado
    ? `<div class="testado ${t.libre?'estado-libre':'estado-asig'}">${t.libre?'Libre':('Asignada a boleta '+esc(t.boleta||'?'))}</div>`
    : '';
  const foto = t.url_comprobante
    ? `<span class="tfoto" data-url="${esc(t.url_comprobante)}">Ver foto</span>`
    : '';
  return `
    <div class="tmain">${esc(t.plataforma || '—')} · ${pesos(t.monto)}</div>
    <div class="tsub">${sub}</div>
    ${estado}${foto}`;
}

async function buscarPago(mid){
  comprobanteMid = mid;
  abrirModal('<div class="mcargando">Leyendo el comprobante y buscando el pago real…</div>');
  const r = await api('buscar-pago', { media_id: mid, telefono: actual, linea_id: actualLinea });
  verifActual = r;
  if(r.status !== 'ok'){
    abrirModal(`<h3>No se pudo verificar</h3><div class="mnone">${esc(r.mensaje || 'Error')}</div><button class="mcerrar" onclick="cerrarModal()">Cerrar</button>`);
    return;
  }
  const e = r.extraido || {};
  let cand;
  if(r.candidatas && r.candidatas.length){
    const ordenadas = r.candidatas.slice().sort((a,b)=> (b.id===r.sugerida_id?1:0) - (a.id===r.sugerida_id?1:0));
    const cards = ordenadas.map(t => {
      const sug = t.id===r.sugerida_id;
      const abonar = t.libre
        ? `<button class="mabonar" data-id="${esc(t.id)}" data-monto="${t.monto}" data-ref="${esc(t.referencia||'')}" data-plat="${esc(t.plataforma||'')}">Abonar este pago a una boleta</button>`
        : '';
      return `
      <div class="cand ${sug?'sug':''}">
        ${sug ? '<div class="tag">Coincidencia sugerida</div>' : ''}
        ${fmtTrans(t)}
        ${sug && r.razon_sugerida ? `<div class="razon">${esc(r.razon_sugerida)}</div>` : ''}
        ${abonar}
      </div>`;
    }).join('');
    const titulo = r.candidatas.length > 1 ? `<div class="mhdr">Pagos reales del mismo monto y día · ${r.candidatas.length}</div>` : `<div class="mhdr">Pago real encontrado</div>`;
    cand = titulo + cards;
  } else {
    cand = `<div class="mnone">No se encontró ninguna transferencia real LIBRE con estos datos.<br><br>${esc(r.diagnostico || '')}</div>`;
  }
  abrirModal(`
    <h3>Verificación del pago</h3>
    <div class="msub">El sistema leyó el comprobante del cliente y buscó el pago real en tus transferencias. Tú decides; todavía no se abona nada.</div>
    <div class="mblock cliente">
      <div class="mhdr">Lo que dice el comprobante del cliente</div>
      ${fmtTrans({ monto:e.monto, fecha_pago:e.fecha_pago, hora_pago:e.hora_pago, plataforma:e.plataforma, referencia:e.referencia })}
    </div>
    ${cand}
    <button class="mcerrar" onclick="cerrarModal()">Cerrar</button>
  `);
}

window.renderAbono = function(modo){
  const ctx = abonoCtx;
  const boletas = (verifActual && verifActual.boletas) ? verifActual.boletas : [];
  const tabs = boletas.length > 1 ? `
    <div class="ab-tabs">
      <button class="ab-tab ${modo==='una'?'on':''}" onclick="renderAbono('una')">Una boleta</button>
      <button class="ab-tab ${modo==='rep'?'on':''}" onclick="renderAbono('rep')">Repartir</button>
    </div>` : '';
  let cuerpo;
  if(modo === 'rep'){
    cuerpo = `
      <div class="msub">Reparte ${pesos(ctx.monto)} entre las boletas. La suma debe quedar exacta.</div>
      <button class="ab-igual" onclick="repartirIgual()">Dividir igual</button>
      ${boletas.map(b => `<div class="rep-row"><span>Boleta ${esc(b.numero)}<br><small>debe ${pesos(b.saldo)}</small></span><input class="rep-input" data-num="${esc(b.numero)}" type="number" min="0" placeholder="0"></div>`).join('')}
      <div class="rep-total" id="repTotal"></div>
      <button class="ab-confirm" id="repConfirm" onclick="confirmarReparto()">Repartir y abonar</button>`;
  } else {
    cuerpo = boletas.length
      ? boletas.map(b => `<button class="mboleta" data-num="${esc(b.numero)}">Boleta ${esc(b.numero)} · debe ${pesos(b.saldo)}</button>`).join('')
      : '<div class="mnone">Este cliente no tiene boletas con saldo pendiente.</div>';
  }
  abrirModal(`
    <h3>Abonar el pago</h3>
    <div class="msub">Pago de ${pesos(ctx.monto)} · ${ctx.ref ? 'Ref ' + esc(ctx.ref) : esc(ctx.plat)}.</div>
    ${tabs}
    ${cuerpo}
    <button class="mcerrar" onclick="cerrarModal()">Cancelar</button>
  `);
  if(modo === 'rep') actualizarRepTotal();
};

window.repartirIgual = function(){
  const inputs = [...document.querySelectorAll('.rep-input')];
  const n = inputs.length;
  if(!n) return;
  const base = Math.floor(abonoCtx.monto / n);
  const resto = abonoCtx.monto - base * n;
  inputs.forEach((inp, i) => { inp.value = base + (i === n-1 ? resto : 0); });
  actualizarRepTotal();
};

function actualizarRepTotal(){
  const inputs = [...document.querySelectorAll('.rep-input')];
  const suma = inputs.reduce((s, inp) => s + (Number(inp.value) || 0), 0);
  const el = $('repTotal'), btn = $('repConfirm');
  if(!el) return;
  el.textContent = `Asignado: ${pesos(suma)} de ${pesos(abonoCtx.monto)}`;
  const exacto = suma === abonoCtx.monto;
  el.className = 'rep-total ' + (exacto ? 'ok' : 'bad');
  if(btn) btn.disabled = !exacto;
}

window.confirmarReparto = async function(){
  const inputs = [...document.querySelectorAll('.rep-input')];
  const boletasMap = {}; (verifActual.boletas || []).forEach(b => boletasMap[b.numero] = b.saldo);
  const montos = {}; let suma = 0; let algoCero = false;
  inputs.forEach(inp => { const v = Number(inp.value) || 0; if(v <= 0) algoCero = true; montos[inp.dataset.num] = v; suma += v; });
  if(algoCero) return alert('Cada boleta debe llevar un monto mayor a 0. Si una no recibe nada, déjala por fuera abonando aparte.');
  if(suma !== abonoCtx.monto) return alert('La suma debe ser exactamente ' + pesos(abonoCtx.monto) + '.');
  const nums = Object.keys(montos);
  for(const num of nums){
    if(montos[num] > (boletasMap[num] || 0)) return alert(`La boleta ${num} solo debe ${pesos(boletasMap[num]||0)}. No le asignes ${pesos(montos[num])}.`);
  }

  abrirModal('<div class="mcargando">Repartiendo el pago…</div>');
  let okCount = 0; const errores = [];
  for(let i = 0; i < nums.length; i++){
    const num = nums[i];
    const payload = {
      contrasena: localStorage.getItem(PWD_KEY),
      numeroBoleta: num,
      valorAbono: montos[num],
      metodoPago: abonoCtx.plat || 'Transferencia',
      referencia: abonoCtx.ref || '',
      idTransferencia: i === 0 ? abonoCtx.id : '',        // solo la 1ª consume la transferencia
      esPagoInteligente: !!abonoCtx.id,
      boletasRepartidas: i === 0 ? nums.map(String) : undefined,
    };
    let res = await fetch('/api/admin/abono', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) }).then(x => x.json()).catch(e => ({ status:'error', mensaje:e.message }));
    if(res.status === 'ok') okCount++; else errores.push(`Boleta ${num}: ${res.mensaje || 'error'}`);
  }
  if(errores.length === 0){
    abrirModal(`<h3>Pago repartido</h3><div class="mnone">Se repartió ${pesos(abonoCtx.monto)} entre ${nums.length} boletas.</div><button class="mcerrar" onclick="cerrarModal()">Listo</button>`);
  } else {
    abrirModal(`<h3>Repartido con avisos</h3><div class="mnone">Se registraron ${okCount} de ${nums.length}.<br>${errores.map(esc).join('<br>')}</div><button class="mcerrar" onclick="cerrarModal()">Cerrar</button>`);
  }
  cargarFicha(actual);
  cargarLista();
};

// Paso 2: registrar el abono (reusa /api/admin/abono, que valida todo)
async function confirmarAbono(num, permitirExceso){
  abrirModal('<div class="mcargando">Registrando el abono…</div>');
  let r;
  try{
    r = await fetch('/api/admin/abono', { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        contrasena: localStorage.getItem(PWD_KEY),
        numeroBoleta: num,
        valorAbono: abonoCtx.monto,
        metodoPago: abonoCtx.plat || 'Transferencia',
        referencia: abonoCtx.ref || '',
        idTransferencia: abonoCtx.id,
        permitirExceso: !!permitirExceso,
      }) }).then(x => x.json());
  }catch(err){ r = { status:'error', mensaje: err.message }; }

  if(r.status === 'ok'){
    abrirModal(`<h3>Abono registrado</h3><div class="mnone">Se abonó ${pesos(abonoCtx.monto)} a la boleta ${esc(num)}.</div><button class="mcerrar" onclick="cerrarModal()">Listo</button>`);
    cargarFicha(actual);
    cargarLista();
  } else if(r.codigo === 'EXCESO_SALDO'){
    abrirModal(`
      <h3>El pago supera el saldo</h3>
      <div class="mnone">${esc(r.mensaje || '')}</div>
      <button class="mboleta mexceso" data-num="${esc(num)}">Abonar de todos modos (la boleta queda en $0)</button>
      <button class="mcerrar" onclick="iniciarAbono(abonoCtx)">Elegir otra boleta</button>
    `);
  } else {
    abrirModal(`<h3>No se pudo abonar</h3><div class="mnone">${esc(r.mensaje || 'Error')}</div><button class="mcerrar" onclick="iniciarAbono(abonoCtx)">Volver</button>`);
  }
}
async function verComparacion(urlSistema){
  let urlCliente = comprobanteMid ? mediaCache[comprobanteMid] : null;
  if(!urlCliente && comprobanteMid){
    try{
      const resp = await fetch('/api/whatsapp/media', { method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ contrasena: localStorage.getItem(PWD_KEY), media_id: comprobanteMid, linea_id: actualLinea }) });
      if(resp.ok){ urlCliente = URL.createObjectURL(await resp.blob()); mediaCache[comprobanteMid] = urlCliente; }
    }catch(_){}
  }
  $('fotoBg').innerHTML = `
    <div class="cmp" onclick="event.stopPropagation()">
      <div class="cmp-col"><div class="cmp-lbl">Comprobante del cliente</div>${urlCliente ? `<img src="${urlCliente}">` : '<div class="cmp-none">No disponible</div>'}</div>
      <div class="cmp-col"><div class="cmp-lbl">Pago encontrado por el sistema</div><img src="${urlSistema}"></div>
    </div>`;
  $('fotoBg').classList.add('show');
}

async function cargarContactos(reset){
  if(reset){ contactosPage = 0; $('listaContactos').innerHTML = '<div class="vacio-lista">Cargando contactos…</div>'; }
  const q = $('buscarContacto').value.trim();
  const r = await api('contactos', { linea_id: lineaActual, q, page: contactosPage });
  if(vista !== 'contactos') return;
  if(r.status !== 'ok'){ $('listaContactos').innerHTML = '<div class="vacio-lista">No se pudieron cargar.</div>'; return; }
  contactosTotal = r.total;
  const rows = (r.contactos || []).map(c => {
    const nom = c.nombre_perfil || ('+' + c.telefono);
    const sub = c.correo || ('+' + c.telefono);
    const ini = (nom || '?').trim().charAt(0).toUpperCase();
    return `<div class="chat-item" data-tel="${esc(c.telefono)}" data-nom="${esc(c.nombre_perfil || '')}">
      <div class="avatar">${esc(ini)}</div>
      <div class="info"><div class="nom">${esc(nom)}</div><div class="prev">${esc(sub)}</div></div>
    </div>`;
  }).join('');
  const cargados = contactosPage * r.porPagina + (r.contactos ? r.contactos.length : 0);
  const masBtn = (cargados < contactosTotal) ? `<button class="cargarmas" onclick="masContactos()">Cargar más (${contactosTotal - cargados} restantes)</button>` : '';
  if(reset || contactosPage === 0){
    $('listaContactos').innerHTML = (rows || '<div class="vacio-lista">Sin contactos</div>') + masBtn;
  } else {
    const old = $('listaContactos').querySelector('.cargarmas'); if(old) old.remove();
    $('listaContactos').insertAdjacentHTML('beforeend', rows + masBtn);
  }
}

$('btnImportar').onclick = () => $('fileImport').click();
$('fileImport').onchange = async (e) => {
  const file = e.target.files[0];
  if(!file) return;
  let texto = '';
  try { texto = await file.text(); } catch(_) { alert('No se pudo leer el archivo.'); return; }
  const filas = parseCSV(texto);
  $('fileImport').value = '';
  if(!filas.length){ alert('No encontré contactos en el archivo. Asegúrate de exportar en CSV con una columna de teléfono.'); return; }
  abrirModal(`<div class="mcargando">Importando ${filas.length} contactos…</div>`);
  let total = 0;
  for(let i = 0; i < filas.length; i += 500){
    const bloque = filas.slice(i, i + 500);
    const r = await api('contactos-importar', { linea_id: lineaActual, contactos: bloque });
    if(r.status !== 'ok'){
      abrirModal(`<h3>Error al importar</h3><div class="mnone">${esc(r.mensaje || '')}<br>Importados antes del error: ${total}</div><button class="mcerrar" onclick="cerrarModal()">Cerrar</button>`);
      return;
    }
    total += (r.importados || 0);
    abrirModal(`<div class="mcargando">Importando… ${total}/${filas.length}</div>`);
  }
  abrirModal(`<h3>Importación lista</h3><div class="mnone">Se importaron ${total} contactos a esta línea.</div><button class="mcerrar" onclick="cerrarModal()">Listo</button>`);
  if(vista === 'contactos') cargarContactos(true);
};

// Parser de CSV: maneja comillas y detecta columnas nombre/teléfono/correo
function parseCSV(texto){
  const lineas = texto.replace(/\r/g, '').split('\n').filter(l => l.trim().length);
  if(lineas.length < 2) return [];
  const delim = (lineas[0].split(';').length > lineas[0].split(',').length) ? ';' : ',';
  const parseLine = (l) => {
    const out = []; let cur = '', q = false;
    for(let i = 0; i < l.length; i++){
      const ch = l[i];
      if(q){ if(ch === '"'){ if(l[i+1] === '"'){ cur += '"'; i++; } else q = false; } else cur += ch; }
      else { if(ch === '"') q = true; else if(ch === delim){ out.push(cur); cur = ''; } else cur += ch; }
    }
    out.push(cur);
    return out.map(s => s.trim());
  };
  const header = parseLine(lineas[0]).map(h => h.toLowerCase());
  const exacto = (n) => header.indexOf(n);
  const contiene = (kws) => header.findIndex(h => kws.some(k => h.includes(k)));
  let iTel = exacto('phone'); if(iTel < 0) iTel = contiene(['whatsapp', 'phone', 'tel', 'celular', 'móvil', 'movil']);
  if(iTel < 0) return [];
  let iNom = exacto('name'); if(iNom < 0) iNom = exacto('first_name'); if(iNom < 0) iNom = contiene(['nombre', 'name']);
  let iCor = exacto('email'); if(iCor < 0) iCor = contiene(['correo', 'email', 'mail']);
  const filas = [];
  for(let r = 1; r < lineas.length; r++){
    const cols = parseLine(lineas[r]);
    const tel = (cols[iTel] || '').trim();
    if(!tel) continue;
    filas.push({
      nombre: iNom >= 0 ? (cols[iNom] || '') : '',
      telefono: tel,
      correo: iCor >= 0 ? (cols[iCor] || '') : '',
    });
  }
  return filas;
}
